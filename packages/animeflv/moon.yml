project:
    name: AnimeFLV
    description: AnimeFLV CLI

tasks:
    pnpm:
        command: pnpm
        args:
            - --filter
            - "@anime-list/animeflv"
        options:
            runFromWorkspaceRoot: true
            cache: false

    build:
        command: pnpm
        args:
            - exec
            - tsup
        inputs:
            - src/**/*.ts
            - types/**/*.d.ts
            - tsup.config.ts
            - tsconfig.json

    run:
        command: node
        args:
            - dist/index.js
        deps:
            - animeflv:build
        options:
            outputStyle: stream
            cache: false
            interactive: true
