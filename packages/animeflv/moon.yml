project:
    name: AnimeFLV
    description: AnimeFLV CLI

tasks:
    pnpm:
        command: pnpm
        args:
            - --filter
            - "@anime-list/animeflv"
        options:
            runFromWorkspaceRoot: true
            cache: false

    build:
        command: pnpm
        args:
            - build
        inputs:
            - src/**/*.ts
            - types/**/*.d.ts
            - tsup.config.ts
            - tsconfig.json

    build-default:
        command: pnpm
        args:
            - build
        inputs:
            - src/**/*.ts
            - types/**/*.d.ts
            - tsup.config.ts
            - tsconfig.json
        env:
            ANIMEFLV_BUILD_TARGET: default

    run:
        command: node
        args:
            - packages/animeflv/dist/index.js
        deps:
            - animeflv:build-default
        options:
            cache: false
            interactive: true
            outputStyle: stream
            runFromWorkspaceRoot: true
